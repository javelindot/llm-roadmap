<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>$title</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root, [data-theme="light"] {
    --bg:#f0f4f8; --bg2:#e8edf5; --bg3:#e2e8f0;
    --card:#ffffff;
    --text:#1e293b; --text2:#475569; --text3:#94a3b8;
    --border:#e2e8f0; --border2:#cbd5e1;
    --accent:#6366f1; --accent2:#4f46e5; --accent-soft:rgba(99,102,241,.08);
    --code-bg:#f8fafc; --code-text:#1e293b;
    --code-key:#7c3aed; --code-str:#059669; --code-com:#64748b; --code-num:#dc2626;
    --shadow:0 1px 3px rgba(30,41,59,.06); --callout-border:#e2e8f0;
    --nav-bg:rgba(255,255,255,.88);
  }
  [data-theme="dark"] {
    --bg:#0a0a0a; --bg2:#111111; --bg3:#18181b;
    --card:#0f0f10;
    --text:#fafafa; --text2:#a1a1aa; --text3:#71717a;
    --border:#27272a; --border2:#3f3f46;
    --accent:#60a5fa; --accent2:#93c5fd; --accent-soft:rgba(96,165,250,.08);
    --code-bg:#0a0a0a; --code-text:#e4e4e7;
    --code-key:#c4b5fd; --code-str:#86efac; --code-com:#71717a; --code-num:#fca5a5;
    --shadow:0 1px 2px rgba(0,0,0,.4); --callout-border:#27272a;
    --nav-bg:rgba(10,10,10,.85);
  }
  [data-theme="solarized"] {
    --bg:#fdf6e3; --bg2:#f5efd5; --bg3:#eee8d5;
    --card:#fdf6e3;
    --text:#586e75; --text2:#657b83; --text3:#93a1a1;
    --border:#eee8d5; --border2:#d8d2bf;
    --accent:#268bd2; --accent2:#2aa198; --accent-soft:rgba(38,139,210,.10);
    --code-bg:#eee8d5; --code-text:#586e75;
    --code-key:#6c71c4; --code-str:#859900; --code-com:#93a1a1; --code-num:#cb4b16;
    --shadow:0 1px 2px rgba(88,110,117,.06); --callout-border:#eee8d5;
    --nav-bg:rgba(253,246,227,.85);
  }
  [data-theme="dracula"] {
    --bg:#282a36; --bg2:#2d2f3d; --bg3:#383a4a;
    --card:#2d2f3d;
    --text:#f8f8f2; --text2:#bcc1d3; --text3:#6272a4;
    --border:#44475a; --border2:#565a73;
    --accent:#bd93f9; --accent2:#ff79c6; --accent-soft:rgba(189,147,249,.12);
    --code-bg:#21222c; --code-text:#f8f8f2;
    --code-key:#ff79c6; --code-str:#50fa7b; --code-com:#6272a4; --code-num:#bd93f9;
    --shadow:0 1px 2px rgba(0,0,0,.3); --callout-border:#44475a;
    --nav-bg:rgba(40,42,54,.85);
  }
  [data-theme="nord"] {
    --bg:#2e3440; --bg2:#353b48; --bg3:#3b4252;
    --card:#353b48;
    --text:#eceff4; --text2:#d8dee9; --text3:#7b8497;
    --border:#434c5e; --border2:#4c566a;
    --accent:#88c0d0; --accent2:#5e81ac; --accent-soft:rgba(136,192,208,.12);
    --code-bg:#2a303c; --code-text:#eceff4;
    --code-key:#81a1c1; --code-str:#a3be8c; --code-com:#7b8497; --code-num:#b48ead;
    --shadow:0 1px 2px rgba(0,0,0,.3); --callout-border:#434c5e;
    --nav-bg:rgba(46,52,64,.85);
  }
  [data-theme="tokyo-night"] {
    --bg:#1a1b26; --bg2:#16161e; --bg3:#1f2335;
    --card:#1f2335;
    --text:#c0caf5; --text2:#a9b1d6; --text3:#565f89;
    --border:#292e42; --border2:#3b4261;
    --accent:#7aa2f7; --accent2:#bb9af7; --accent-soft:rgba(122,162,247,.12);
    --code-bg:#16161e; --code-text:#c0caf5;
    --code-key:#bb9af7; --code-str:#9ece6a; --code-com:#565f89; --code-num:#ff9e64;
    --shadow:0 1px 2px rgba(0,0,0,.4); --callout-border:#292e42;
    --nav-bg:rgba(26,27,38,.85);
  }
  [data-theme="catppuccin"] {
    --bg:#1e1e2e; --bg2:#181825; --bg3:#313244;
    --card:#181825;
    --text:#cdd6f4; --text2:#bac2de; --text3:#7f849c;
    --border:#313244; --border2:#45475a;
    --accent:#cba6f7; --accent2:#f5c2e7; --accent-soft:rgba(203,166,247,.12);
    --code-bg:#11111b; --code-text:#cdd6f4;
    --code-key:#cba6f7; --code-str:#a6e3a1; --code-com:#7f849c; --code-num:#fab387;
    --shadow:0 1px 2px rgba(0,0,0,.4); --callout-border:#313244;
    --nav-bg:rgba(30,30,46,.85);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg); color:var(--text); line-height:1.75;
    transition:background .2s,color .2s;
    font-size:15px;
  }
  a { color:inherit; text-decoration:none; }

  .nav {
    position:sticky; top:0; z-index:100;
    background:var(--nav-bg); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    padding:16px 36px;
    display:flex; align-items:center; gap:6px;
  }
  .brand {
    font-size:.95rem; font-weight:700; color:var(--text);
    font-family:'SF Mono',Menlo,Consolas,monospace;
    letter-spacing:-.02em;
  }
  .nav-spacer { flex:1; }
  .nav-link {
    color:var(--text2); font-size:14px; font-weight:500;
    padding:7px 14px; border-radius:7px;
    transition:color .2s,background .2s;
  }
  .nav-link:hover { color:var(--accent); background:var(--accent-soft); }
  /* Theme switcher */
  .theme-switcher { position:relative; margin-right:6px; }
  .theme-btn {
    height:30px; padding:0 10px;
    background:transparent; border:1px solid var(--border); border-radius:6px;
    color:var(--text2); cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
    font-family:'SF Mono',Menlo,Consolas,monospace; font-size:12.5px;
    transition:color .15s,border-color .15s,background .15s;
  }
  .theme-btn:hover { color:var(--text); background:var(--bg3); }
  .theme-btn .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
  .theme-btn .caret { color:var(--text3); margin-left:2px; }
  .theme-menu {
    position:absolute; top:100%; right:0; margin-top:4px; z-index:200;
    background:var(--card); border:1px solid var(--border); border-radius:6px;
    padding:4px; min-width:148px; display:none;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
  }
  .theme-menu.open { display:block; }
  .theme-menu button {
    display:flex; align-items:center; gap:8px;
    width:100%; padding:6px 10px; text-align:left;
    background:transparent; border:none; cursor:pointer;
    font-family:'SF Mono',Menlo,Consolas,monospace; font-size:13px;
    color:var(--text2); border-radius:4px;
  }
  .theme-menu button:hover { background:var(--bg3); color:var(--text); }
  .theme-menu button.active { background:var(--bg3); color:var(--text); }
  .theme-menu .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dot-light { background:linear-gradient(135deg,#fff 50%,#0a0a0a 50%); border:1px solid #d4d4d4; }
  .dot-dark { background:#0a0a0a; border:1px solid #3f3f46; }
  .dot-solarized { background:#b58900; }
  .dot-dracula { background:#bd93f9; }
  .dot-nord { background:#88c0d0; }
  .dot-tokyo-night { background:#7aa2f7; }
  .dot-catppuccin { background:#cba6f7; }

  .layout {
    display:grid;
    grid-template-columns:260px minmax(0,1fr) 240px;
    gap:24px; padding:28px 32px;
    max-width:1440px; margin:0 auto;
    align-items:start;
  }
  .side-l, .side-r {
    position:sticky; top:80px;
    max-height:calc(100vh - 100px);
    overflow-y:auto;
    padding:24px 18px;
    background:var(--card);
    border:1px solid var(--border); border-radius:16px;
    box-shadow:var(--shadow);
  }
  .side-l::-webkit-scrollbar, .side-r::-webkit-scrollbar { width:6px; }
  .side-l::-webkit-scrollbar-thumb, .side-r::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  .side-title {
    font-size:11px; font-weight:700; letter-spacing:.14em;
    color:var(--text3); text-transform:uppercase;
    padding:0 8px; margin-bottom:14px;
  }
  .chap-head { font-size:13px; font-weight:700; color:var(--text); padding:12px 8px 6px; }
  .chap-item {
    display:block; padding:8px 12px;
    color:var(--text2); font-size:13.5px;
    border-radius:8px;
    transition:background .15s,color .15s;
  }
  .chap-item:hover { background:var(--accent-soft); color:var(--accent); }
  .chap-item.active { background:var(--accent-soft); color:var(--accent); font-weight:600; }

  main {
    background:var(--card);
    border:1px solid var(--border); border-radius:16px;
    padding:56px 64px; min-width:0;
    box-shadow:var(--shadow);
  }
  .eyebrow {
    font-size:11px; font-weight:700; letter-spacing:.14em;
    color:var(--text3); text-transform:uppercase; margin-bottom:12px;
  }
  main h1 { font-size:2.6rem; font-weight:800; line-height:1.18; margin-bottom:14px; letter-spacing:-.01em; }
  main > .lead {
    font-size:1.05rem; color:var(--text2);
    padding-bottom:32px; margin-bottom:36px;
    border-bottom:1px solid var(--border);
  }
  main section {
    scroll-margin-top:80px;
    padding-bottom:80px;
    margin-bottom:40px;
    border-bottom:1px solid var(--border);
  }
  main section:last-of-type { border-bottom:none; margin-bottom:0; padding-bottom:40px; }
  main h2 { font-size:1.7rem; font-weight:800; margin-top:56px; margin-bottom:18px; scroll-margin-top:80px; }
  main h2:first-of-type, main section:first-of-type h2 { margin-top:8px; }
  main h3 { font-size:1.2rem; font-weight:700; margin-top:32px; margin-bottom:12px; scroll-margin-top:80px; color:var(--text); }
  main p { color:var(--text2); margin-bottom:14px; }
  main ul, main ol { color:var(--text2); margin-bottom:16px; padding-left:24px; }
  main li { margin-bottom:6px; }
  main li::marker { color:var(--accent); }
  main strong { color:var(--text); font-weight:700; }
  main code:not(pre code) {
    background:var(--accent-soft); color:var(--accent);
    padding:2px 7px; border-radius:5px;
    font-size:.875em; font-family:'SF Mono',Menlo,Consolas,monospace;
  }
  main pre {
    background:var(--code-bg); color:var(--code-text);
    padding:20px 24px; border-radius:12px;
    overflow-x:auto; margin-bottom:18px;
    font-size:.875rem; line-height:1.7;
    font-family:'SF Mono',Menlo,Consolas,monospace;
  }
  main pre .k { color:var(--code-key); }
  main pre .s { color:var(--code-str); }
  main pre .c { color:var(--code-com); font-style:italic; }
  main pre .n { color:var(--code-num); }
  main blockquote {
    border-left:3px solid var(--accent);
    background:var(--accent-soft);
    padding:14px 18px; border-radius:0 8px 8px 0;
    margin:18px 0; color:var(--text2);
  }
  main blockquote p:last-child { margin-bottom:0; }
  main table { width:100%; border-collapse:collapse; margin:18px 0; font-size:.9rem; }
  main th, main td { text-align:left; padding:12px 14px; border-bottom:1px solid var(--border); }
  main th { color:var(--text); font-weight:700; background:var(--accent-soft); }
  main td { color:var(--text2); }
  .callout {
    display:flex; gap:14px;
    background:var(--accent-soft);
    border:1px solid var(--callout-border);
    padding:16px 18px; border-radius:10px;
    margin:18px 0;
  }
  .callout .ic { font-size:1.4rem; flex-shrink:0; }
  .callout p:last-child { margin-bottom:0; }

  .toc-item {
    display:block; padding:5px 12px;
    color:var(--text2); font-size:12.5px;
    border-left:2px solid transparent; margin-left:2px;
    transition:color .15s,border-color .15s;
  }
  .toc-item:hover { color:var(--accent); }
  .toc-item.active { color:var(--accent); border-color:var(--accent); font-weight:600; }
  .toc-item.toc-h1 { font-weight:600; color:var(--text); font-size:13px; margin-top:8px; }
  .toc-item.toc-h1:first-of-type { margin-top:0; }
  .toc-item.toc-h2 { padding-left:20px; font-size:12px; }
  .toc-item.toc-h3 { padding-left:32px; font-size:11.5px; color:var(--text3); }

  .chap-nav {
    margin-top:48px; padding-top:24px;
    border-top:1px solid var(--border);
    display:flex; justify-content:space-between; gap:16px;
  }
  .chap-nav a {
    flex:1; padding:16px 18px;
    border:1px solid var(--border); border-radius:12px;
    transition:border-color .2s, transform .2s;
  }
  .chap-nav a:hover { border-color:var(--accent); transform:translateY(-2px); }
  .chap-nav .lbl { font-size:11px; color:var(--text3); margin-bottom:4px; }
  .chap-nav .ttl { font-weight:700; color:var(--text); }
  .chap-nav a.next { text-align:right; }

  @media (max-width:1200px) {
    .layout { grid-template-columns:240px minmax(0,1fr); }
    .side-r { display:none; }
  }
  @media (max-width:820px) {
    .layout { grid-template-columns:1fr; padding:16px; gap:16px; }
    .side-l { position:static; max-height:none; }
    main { padding:32px 24px; }
    main h1 { font-size:1.9rem; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="brand" href="$cover_url">$brand</a>
  <div class="nav-spacer"></div>
  <div class="theme-switcher">
    <button class="theme-btn" id="themeBtn" aria-label="切换主题">
      <span class="dot"></span><span class="tname">light</span><span class="caret">▾</span>
    </button>
    <div class="theme-menu" id="themeMenu">
      <button data-theme="light"><span class="dot dot-light"></span>light</button>
      <button data-theme="dark"><span class="dot dot-dark"></span>dark</button>
      <button data-theme="solarized"><span class="dot dot-solarized"></span>solarized</button>
      <button data-theme="dracula"><span class="dot dot-dracula"></span>dracula</button>
      <button data-theme="nord"><span class="dot dot-nord"></span>nord</button>
      <button data-theme="tokyo-night"><span class="dot dot-tokyo-night"></span>tokyo-night</button>
      <button data-theme="catppuccin"><span class="dot dot-catppuccin"></span>catppuccin</button>
    </div>
  </div>
  <a class="nav-link" href="$main_url">← 主站</a>
  <a class="nav-link" href="$cover_url">$cover_label</a>
  <a class="nav-link" href="https://github.com/javelindot/llm-roadmap" target="_blank" rel="noopener">GitHub</a>
</nav>

<div class="layout">

  <aside class="side-l">
    <div class="side-title">Chapters</div>
$sidebar
  </aside>

  <main>
    <div class="eyebrow">$eyebrow</div>
    <h1>$h1</h1>
    <p class="lead">$lead</p>

$content
  </main>

  <aside class="side-r">
    <div class="side-title">On This Page</div>
$toc
  </aside>
</div>

<script>
  const tBtn = document.getElementById('themeBtn');
  const tMenu = document.getElementById('themeMenu');
  const tHtml = document.documentElement;
  function applyTheme(name) {
    tHtml.dataset.theme = name;
    tBtn.querySelector('.tname').textContent = name;
    tMenu.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.theme === name));
    localStorage.setItem('theme', name);
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  tBtn.addEventListener('click', e => { e.stopPropagation(); tMenu.classList.toggle('open'); });
  tMenu.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { applyTheme(b.dataset.theme); tMenu.classList.remove('open'); }));
  document.addEventListener('click', () => tMenu.classList.remove('open'));

  const sections = document.querySelectorAll('main section[id]');
  const headings = document.querySelectorAll('main h2[id], main h3[id]');
  const tocLinks = document.querySelectorAll('.side-r .toc-item');
  const chapLinks = document.querySelectorAll('.side-l .chap-item');

  let currentSectionId = null;

  function filterTocBySection(sectionId) {
    currentSectionId = sectionId;
    tocLinks.forEach(a => {
      const sec = a.getAttribute('data-section');
      a.style.display = sec === sectionId ? '' : 'none';
      a.classList.remove('active');
    });
  }

  function setActiveHeading(id) {
    tocLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));
  }

  function setActiveChapter(id) {
    chapLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));
  }

  function highlightCurrentPage() {
    const current = location.pathname.split('/').pop();
    chapLinks.forEach(a => {
      const href = a.getAttribute('href');
      if (!href.startsWith('#')) {
        a.classList.toggle('active', href === current || href === './' + current);
      }
    });
  }
  highlightCurrentPage();

  // Section IO：决定当前活跃章节 → 过滤右栏 + 高亮左栏
  const sectionIO = new IntersectionObserver(entries => {
    const visible = entries.filter(e => e.isIntersecting)
      .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
    if (visible[0]) {
      const id = visible[0].target.id;
      setActiveChapter(id);
      filterTocBySection(id);
    }
  }, { rootMargin: '-80px 0px -55% 0px', threshold: 0 });
  sections.forEach(s => sectionIO.observe(s));

  // Heading IO：决定右栏高亮哪个子标题
  const headingIO = new IntersectionObserver(entries => {
    const visible = entries.filter(e => e.isIntersecting)
      .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
    if (visible[0]) setActiveHeading(visible[0].target.id);
  }, { rootMargin: '-80px 0px -55% 0px', threshold: 0 });
  headings.forEach(h => headingIO.observe(h));

  // 初始化：默认显示第一个 section 的 TOC
  if (sections.length > 0) {
    const firstId = sections[0].id;
    setActiveChapter(firstId);
    filterTocBySection(firstId);
  }
</script>
</body>
</html>
