<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI大模型完整学习路线指南</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="AI大模型完整学习路线指南，从数学基础到机器学习，再到自然语言处理，构建完整的AI学习体系">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        /* 移除标题下划线 */
        .markdown-section h1,
        .markdown-section h2,
        .markdown-section h3,
        .markdown-section h4,
        .markdown-section h5,
        .markdown-section h6 {
            border-bottom: none !important;
        }
        
        /* 移除Docsify默认的绿色下划线 */
        .markdown-section h2 {
            border-bottom: none !important;
        }
        
        /* 调整标题样式 */
        .markdown-section h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .markdown-section h2 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        
        .markdown-section h3 {
            font-size: 1.25rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: 'AI大模型学习路线',
            repo: 'https://github.com/javelindot/llm-roadmap',
            loadSidebar: '_sidebar.md',
            subMaxLevel: 0,
            homepage: 'README.md',
            relativePath: false,
            routerMode: 'hash',
            markdown: {
                renderer: {
                    code: function(code, lang) {
                        if (lang === 'mermaid') {
                            return '<div class="mermaid">' + code + '</div>';
                        }
                        return this.origin.code.apply(this, arguments);
                    }
                }
            },
            plugins: [
                function(hook) {
                    hook.doneEach(function() {
                        if (window.mermaid) {
                            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
                        }
                        if (window.renderMathInElement) {
                            renderMathInElement(document.body, {
                                delimiters: [
                                    {left: '$$', right: '$$', display: true},
                                    {left: '\\[', right: '\\]', display: true},
                                    {left: '$', right: '$', display: false},
                                    {left: '\\(', right: '\\)', display: false}
                                ],
                                throwOnError: false
                            });
                        }
                    });
                }
            ]
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-mermaid/dist/docsify-mermaid.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true });
    </script>
</body>
</html>
