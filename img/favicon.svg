<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 深色科技感背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- 霓虹蓝紫渐变文字 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <!-- 外发光 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 内发光 -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bgGrad)"/>

  <!-- 科技感边框线条 -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="none" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.4"/>
  <rect x="12" y="12" width="104" height="104" rx="20" fill="none" stroke="url(#textGrad)" stroke-width="0.8" opacity="0.2"/>

  <!-- 四角装饰点 -->
  <circle cx="22" cy="22" r="3" fill="#60a5fa" opacity="0.8"/>
  <circle cx="106" cy="22" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="22" cy="106" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="106" cy="106" r="3" fill="#60a5fa" opacity="0.8"/>

  <!-- 网格线装饰 -->
  <line x1="64" y1="16" x2="64" y2="24" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="104" x2="64" y2="112" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="64" x2="24" y2="64" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <line x1="104" y1="64" x2="112" y2="64" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>

  <!-- JM 文字 -->
  <text x="64" y="78" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="52" font-weight="700" letter-spacing="-2" fill="url(#textGrad)" filter="url(#glow)">JM</text>

  <!-- 底部科技线 -->
  <line x1="32" y1="96" x2="96" y2="96" stroke="url(#textGrad)" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <circle cx="32" cy="96" r="2" fill="#60a5fa"/>
  <circle cx="96" cy="96" r="2" fill="#c084fc"/>
</svg>